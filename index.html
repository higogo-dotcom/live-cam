<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍯 꿀단지 전세계 실시간 라이브캠</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  :root { --honey: #F5A623; --bg: #0a0a0a; --card: #1a1a1a; --text: #fff; --muted: #888; --border: #333; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  .top-bar { background: var(--honey); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
  .top-bar h1 { font-size: 16px; font-weight: 900; color: white; }
  .top-bar a { font-size: 12px; color: white; background: rgba(255,255,255,0.25); padding: 4px 10px; border-radius: 20px; text-decoration: none; }
  .live-badge { display: inline-block; background: red; color: white; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left: 6px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .layout { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; }
  .panel { width: 320px; background: var(--card); display: flex; flex-direction: column; border-left: 1px solid var(--border); flex-shrink: 0; }
  .panel-video { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
  .panel-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .panel-info { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 15px; font-weight: 900; }
  .panel-loc { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .cam-list { overflow-y: auto; flex: 1; }
  .cam-list::-webkit-scrollbar { width: 4px; }
  .cam-list::-webkit-scrollbar-thumb { background: #444; }
  .cam-list-title { padding: 10px 14px; font-size: 11px; color: var(--muted); font-weight: 700; border-bottom: 1px solid var(--border); }
  .cam-item { display: flex; gap: 10px; padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; align-items: center; }
  .cam-item:hover { background: #2a2a2a; }
  .cam-item.active { background: #2a1a00; border-left: 3px solid var(--honey); }
  .cam-thumb { width: 72px; height: 40px; border-radius: 6px; overflow: hidden; flex-shrink: 0; background: #111; }
  .cam-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .cam-name { font-size: 12px; font-weight: 700; line-height: 1.3; }
  .cam-loc-text { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .hint { position: absolute; bottom: 16px; left: 16px; background: rgba(0,0,0,0.7); color: white; padding: 8px 14px; border-radius: 20px; font-size: 12px; z-index: 500; pointer-events: none; }
  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .panel { width: 100%; height: 280px; border-left: none; border-top: 1px solid var(--border); }
    .cam-list { display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; }
    .cam-item { min-width: 140px; flex-direction: column; align-items: flex-start; border-bottom: none; border-right: 1px solid var(--border); }
    .cam-thumb { width: 100%; height: 60px; }
  }
</style>
</head>
<body>
<div class="top-bar">
  <h1>🍯 꿀단지 라이브캠 <span class="live-badge">LIVE</span></h1>
  <a href="https://blog.naver.com/honey-pot-" target="_blank">블로그 구독 →</a>
</div>
<div class="layout">
  <div style="position:relative; flex:1;">
    <div id="map" style="width:100%;height:100%;"></div>
    <div class="hint">📍 빨간 점을 클릭하면 실시간 영상!</div>
  </div>
  <div class="panel">
    <div class="panel-video">
      <iframe id="panelIframe" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
    <div class="panel-info">
      <div class="panel-title" id="panelTitle">📍 카메라를 선택해주세요</div>
      <div class="panel-loc" id="panelLoc">지도에서 빨간 점을 클릭하세요</div>
    </div>
    <div class="cam-list-title">🌍 전체 채널 목록</div>
    <div class="cam-list" id="camList"></div>
  </div>
</div>

<script>
const cams = [
  { title: '🗽 뉴욕 타임스퀘어', loc: 'New York, USA', lat: 40.758, lng: -73.985, vid: 'z-jYdOIKcTQ' },
  { title: '🎸 내슈빌 브로드웨이', loc: 'Nashville, USA', lat: 36.161, lng: -86.778, vid: 'h5Grd2w7HQM' },
  { title: '🗼 파리 산책 라이브', loc: 'Paris, France', lat: 48.858, lng: 2.294, vid: '029KyWbQr9A' },
  { title: '🎵 런던 애비로드', loc: 'London, UK', lat: 51.532, lng: -0.178, vid: 'gFRtAAmiFbE' },
  { title: '🏯 도쿄 가부키초', loc: 'Tokyo, Japan', lat: 35.694, lng: 139.700, vid: 'M3EYAY2MftI' },
  { title: '🏙️ 도쿄 시부야', loc: 'Tokyo, Japan', lat: 35.658, lng: 139.701, vid: 'dfVK7ld38Ys' },
  { title: '🚀 ISS 우주정거장', loc: 'International Space Station', lat: 28.573, lng: -80.648, vid: '0FBiyFpV__g' },
  { title: '🛸 NASA ISS 공식', loc: 'NASA, USA', lat: 29.559, lng: -95.089, vid: 'FuuC4dpSQ1M' },
];

let currentIdx = -1;

const map = L.map('map').setView([25, 10], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 18
}).addTo(map);

function playCam(idx) {
  currentIdx = idx;
  const cam = cams[idx];
  document.getElementById('panelIframe').src = `https://www.youtube.com/embed/${cam.vid}?autoplay=1&rel=0`;
  document.getElementById('panelTitle').textContent = cam.title;
  document.getElementById('panelLoc').textContent = '📍 ' + cam.loc;
  document.querySelectorAll('.cam-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  map.setView([cam.lat, cam.lng], 10);
}

const icon = L.divIcon({
  className: '',
  html: `<div style="width:14px;height:14px;background:red;border:2px solid white;border-radius:50%;box-shadow:0 0 6px red;animation:none;"></div>`,
  iconSize: [14, 14], iconAnchor: [7, 7]
});

cams.forEach((cam, idx) => {
  const marker = L.marker([cam.lat, cam.lng], { icon }).addTo(map);
  marker.bindTooltip(`${cam.title}<br><small>📍 ${cam.loc}</small>`, { direction: 'top' });
  marker.on('click', () => playCam(idx));
});

document.getElementById('camList').innerHTML = cams.map((cam, i) => `
  <div class="cam-item" onclick="playCam(${i})">
    <div class="cam-thumb">
      <img src="https://img.youtube.com/vi/${cam.vid}/mqdefault.jpg" loading="lazy">
    </div>
    <div>
      <div class="cam-name">${cam.title}</div>
      <div class="cam-loc-text">${cam.loc}</div>
    </div>
  </div>
`).join('');

playCam(0);
</script>
</body>
</html>
