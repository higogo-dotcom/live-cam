<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍯 꿀단지 전세계 실시간 라이브캠</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  :root { --honey: #F5A623; --bg: #0a0a0a; --card: #1a1a1a; --card2: #222; --text: #fff; --muted: #888; --border: #333; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  .top-bar { background: var(--honey); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .top-bar h1 { font-size: 16px; font-weight: 900; color: white; }
  .top-bar a { font-size: 12px; color: white; background: rgba(255,255,255,0.25); padding: 4px 10px; border-radius: 20px; text-decoration: none; }
  .live-badge { display: inline-block; background: red; color: white; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left: 6px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* 왼쪽 목록 */
  .sidebar { width: 200px; background: var(--card); overflow-y: auto; flex-shrink: 0; border-right: 1px solid var(--border); }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
  .sidebar-title { padding: 10px 12px; font-size: 11px; color: var(--muted); font-weight: 700; border-bottom: 1px solid var(--border); }
  .cam-item { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; }
  .cam-item:hover { background: #2a2a2a; }
  .cam-item.active { background: var(--honey); }
  .cam-item.active .cam-item-loc { color: rgba(255,255,255,0.7); }
  .cam-thumb { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 6px; overflow: hidden; margin-bottom: 6px; position: relative; }
  .cam-thumb iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
  .cam-item-name { font-size: 12px; font-weight: 700; }
  .cam-item-loc { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* 가운데 메인 */
  .center { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-video { flex: 1; position: relative; background: #000; }
  .main-video iframe { width: 100%; height: 100%; border: none; }
  .main-info { padding: 12px 16px; background: var(--card2); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .main-title { font-size: 18px; font-weight: 900; }
  .main-loc { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* 오른쪽 목록 */
  .sidebar-right { width: 200px; background: var(--card); overflow-y: auto; flex-shrink: 0; border-left: 1px solid var(--border); }
  .sidebar-right::-webkit-scrollbar { width: 4px; }
  .sidebar-right::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

  /* 모바일 */
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .sidebar, .sidebar-right { width: 100%; height: 120px; overflow-x: auto; overflow-y: hidden; display: flex; flex-direction: row; border: none; border-bottom: 1px solid var(--border); }
    .sidebar-title { display: none; }
    .cam-item { min-width: 130px; border-bottom: none; border-right: 1px solid var(--border); }
    .sidebar-right { border-top: 1px solid var(--border); }
    .center { flex: 1; }
  }
</style>
</head>
<body>
<div class="top-bar">
  <h1>🍯 꿀단지 라이브캠 <span class="live-badge">LIVE</span></h1>
  <a href="https://blog.naver.com/honey-pot-" target="_blank">블로그 구독 →</a>
</div>
<div class="main">
  <div class="sidebar" id="sidebarLeft"></div>
  <div class="center">
    <div class="main-video">
      <iframe id="mainIframe" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
    <div class="main-info">
      <div>
        <div class="main-title" id="mainTitle"></div>
        <div class="main-loc" id="mainLoc"></div>
      </div>
      <span class="live-badge" style="font-size:12px;padding:4px 10px;">● LIVE</span>
    </div>
  </div>
  <div class="sidebar-right" id="sidebarRight"></div>
</div>

<script>
const cams = [
  { title: '🗽 뉴욕 타임스퀘어', loc: 'New York, USA', vid: 'z-jYdOIKcTQ' },
  { title: '🌁 샌프란시스코', loc: 'San Francisco, USA', vid: 'VGnFLdQW39A' },
  { title: '🎰 라스베가스', loc: 'Las Vegas, USA', vid: 'svPFBkZBGMQ' },
  { title: '🌊 마이애미 비치', loc: 'Miami, USA', vid: 'MKxb_SKnRbk' },
  { title: '🗼 파리 에펠탑', loc: 'Paris, France', vid: 'LctZptPwSRY' },
  { title: '🎡 런던 빅벤', loc: 'London, UK', vid: 'Tr_eAEIkFy0' },
  { title: '🍕 베니스', loc: 'Venice, Italy', vid: 'JcZ1UiGMiuA' },
  { title: '🏰 바르셀로나', loc: 'Barcelona, Spain', vid: 'xSXyBMGUin4' },
  { title: '🏯 도쿄 시부야', loc: 'Tokyo, Japan', vid: 'pDFEkTLAGmo' },
  { title: '🐉 홍콩 야경', loc: 'Hong Kong', vid: 'SQvbBjJoOno' },
  { title: '🌴 방콕', loc: 'Bangkok, Thailand', vid: 'JNfSchpe5Ls' },
  { title: '🦁 싱가포르', loc: 'Singapore', vid: 'bxsIDnRFT-Y' },
  { title: '🐻 알래스카 곰', loc: 'Brooks Falls, Alaska', vid: 'SbFTr-JzFMk' },
  { title: '🚀 NASA 우주정거장', loc: 'ISS Live', vid: '86YLFOog4GM' },
  { title: '🐘 아프리카 사파리', loc: 'South Africa', vid: 'ydYDqZQpnLs' },
  { title: '🌋 하와이 화산', loc: 'Hawaii, USA', vid: 'YBrNKToiDqk' },
];

let currentIdx = 0;

function playCam(idx) {
  currentIdx = idx;
  const cam = cams[idx];
  document.getElementById('mainIframe').src = `https://www.youtube.com/embed/${cam.vid}?autoplay=1&rel=0`;
  document.getElementById('mainTitle').textContent = cam.title;
  document.getElementById('mainLoc').textContent = '📍 ' + cam.loc;
  document.querySelectorAll('.cam-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function renderSidebar(el, indices) {
  el.innerHTML = '<div class="sidebar-title">🌍 채널 목록</div>' + indices.map(i => {
    const cam = cams[i];
    return `<div class="cam-item" onclick="playCam(${i})">
      <div class="cam-thumb">
        <iframe src="https://www.youtube.com/embed/${cam.vid}?autoplay=0&mute=1&rel=0" loading="lazy"></iframe>
      </div>
      <div class="cam-item-name">${cam.title}</div>
      <div class="cam-item-loc">${cam.loc}</div>
    </div>`;
  }).join('');
}

const half = Math.ceil(cams.length / 2);
renderSidebar(document.getElementById('sidebarLeft'), [...Array(half).keys()]);
renderSidebar(document.getElementById('sidebarRight'), [...Array(cams.length - half).keys()].map(i => i + half));
playCam(0);
</script>
</body>
</html>
