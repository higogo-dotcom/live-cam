<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍯 꿀단지 전세계 실시간 라이브캠</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  :root { --honey: #F5A623; --honey-dark: #D4881A; --bg: #0a0a0a; --card: #1a1a1a; --text: #fff; --muted: #888; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  .top-bar { background: var(--honey); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
  .top-bar h1 { font-size: 16px; font-weight: 900; color: white; }
  .top-bar a { font-size: 12px; color: white; background: rgba(255,255,255,0.25); padding: 4px 10px; border-radius: 20px; text-decoration: none; }
  .live-badge { display: inline-block; background: red; color: white; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left: 6px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #map { flex: 1; width: 100%; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a1a; border-radius: 20px; width: 90%; max-width: 800px; overflow: hidden; }
  .modal-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: #222; }
  .modal-title { font-size: 16px; font-weight: 900; }
  .modal-location { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .modal-close { background: #444; border: none; color: white; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }
  .modal-video { position: relative; padding-bottom: 56.25%; height: 0; }
  .modal-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .cam-marker { background: red; border: 3px solid white; border-radius: 50%; width: 16px; height: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.5); animation: pulse 2s infinite; cursor: pointer; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  .hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; z-index: 1000; pointer-events: none; }
</style>
</head>
<body>
<div class="top-bar">
  <h1>🍯 꿀단지 라이브캠 <span class="live-badge">LIVE</span></h1>
  <a href="https://blog.naver.com/honey-pot-" target="_blank">블로그 구독 →</a>
</div>
<div id="map"></div>
<div class="hint">📍 빨간 점을 클릭하면 실시간 영상을 볼 수 있어요!</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-location" id="modalLocation"></div>
      </div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-video">
      <iframe id="modalIframe" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </div>
  </div>
</div>

<script>
const cams = [
  { title: '🗽 뉴욕 타임스퀘어', location: 'New York, USA', lat: 40.758, lng: -73.985, vid: 'z-jYdOIKcTQ' },
  { title: '🌁 샌프란시스코', location: 'San Francisco, USA', lat: 37.773, lng: -122.418, vid: 'VGnFLdQW39A' },
  { title: '🎰 라스베가스', location: 'Las Vegas, USA', lat: 36.114, lng: -115.172, vid: 'svPFBkZBGMQ' },
  { title: '🌊 마이애미 비치', location: 'Miami, USA', lat: 25.761, lng: -80.191, vid: 'MKxb_SKnRbk' },
  { title: '🗼 파리 에펠탑', location: 'Paris, France', lat: 48.858, lng: 2.294, vid: 'LctZptPwSRY' },
  { title: '🎡 런던 빅벤', location: 'London, UK', lat: 51.500, lng: -0.124, vid: 'Tr_eAEIkFy0' },
  { title: '🍕 베니스', location: 'Venice, Italy', lat: 45.434, lng: 12.338, vid: 'JcZ1UiGMiuA' },
  { title: '🏰 바르셀로나', location: 'Barcelona, Spain', lat: 41.385, lng: 2.173, vid: 'xSXyBMGUin4' },
  { title: '🏯 도쿄 시부야', location: 'Tokyo, Japan', lat: 35.658, lng: 139.701, vid: 'pDFEkTLAGmo' },
  { title: '🐉 홍콩 야경', location: 'Hong Kong', lat: 22.319, lng: 114.169, vid: 'SQvbBjJoOno' },
  { title: '🌴 방콕', location: 'Bangkok, Thailand', lat: 13.756, lng: 100.501, vid: 'JNfSchpe5Ls' },
  { title: '🦁 싱가포르', location: 'Singapore', lat: 1.283, lng: 103.853, vid: 'bxsIDnRFT-Y' },
  { title: '🐻 알래스카 곰', location: 'Brooks Falls, Alaska', lat: 58.611, lng: -155.765, vid: 'SbFTr-JzFMk' },
  { title: '🚀 NASA 우주정거장', location: 'ISS Live', lat: 28.573, lng: -80.648, vid: '86YLFOog4GM' },
  { title: '🐘 아프리카 사파리', location: 'South Africa', lat: -24.0, lng: 31.5, vid: 'ydYDqZQpnLs' },
  { title: '🌋 하와이 화산', location: 'Hawaii, USA', lat: 19.421, lng: -155.287, vid: 'YBrNKToiDqk' },
];

const map = L.map('map', { zoomControl: true }).setView([20, 10], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 18
}).addTo(map);

cams.forEach(cam => {
  const icon = L.divIcon({ className: '', html: '<div class="cam-marker"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
  const marker = L.marker([cam.lat, cam.lng], { icon }).addTo(map);
  marker.bindTooltip(`${cam.title}<br><small>${cam.location}</small>`, { permanent: false, direction: 'top' });
  marker.on('click', () => openModal(cam));
});

function openModal(cam) {
  document.getElementById('modalTitle').textContent = cam.title;
  document.getElementById('modalLocation').textContent = '📍 ' + cam.location;
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed/${cam.vid}?autoplay=1&rel=0`;
  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if(e.target === document.getElementById('modal')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modalIframe').src = '';
  document.getElementById('modal').classList.remove('show');
}
</script>
</body>
</html>
